{% extends 'layout.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Изменение пользователя</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_first_name" class="form-label">Имя</label>
            <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}" class="form-control" id="id_first_name" required>
        </div>
        <div class="mb-3">
            <label for="id_last_name" class="form-label">Фамилия</label>
            <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}" class="form-control" id="id_last_name" required>
        </div>
        <div class="mb-3">
            <label for="id_username" class="form-label">Имя пользователя</label>
            <input type="text" name="username" value="{{ form.username.value|default:'' }}" class="form-control" id="id_username" required>
        </div>
        <button type="submit" class="btn btn-primary">Изменить</button>
    </form>
</div>
{% endblock %}
