{% extends 'layout.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Статусы</h1>
    <a href="{% url 'statuses:status_create' %}" class="btn btn-primary mb-3">Создать статус</a>
    <table class="table table-hover table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Дата создания</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for status in statuses %}
                <tr>
                    <td>{{ status.pk }}</td>
                    <td>{{ status.name }}</td>
                    <td>{{ status.created_at|date:"d.m.Y H:i" }}</td>
                    <td>
                        <a href="{% url 'statuses:status_update' status.pk %}" class="btn btn-sm btn-primary">Изменить</a>
                        <a href="{% url 'statuses:status_delete' status.pk %}" class="btn btn-sm btn-danger">Удалить</a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
