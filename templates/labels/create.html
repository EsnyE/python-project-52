{% extends 'layout.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Создать метку</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_name" class="form-label">Имя</label>
            <input type="text" name="name" class="form-control" id="id_name" required>
        </div>
        <button type="submit" class="btn btn-primary">Создать</button>
    </form>
</div>
{% endblock %}
