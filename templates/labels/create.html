{% extends 'layout.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="container mt-4">
    <h1>Создать метку</h1>
    <form method="post">
        {% csrf_token %}
        {% bootstrap5_form form %}
        <button type="submit" class="btn btn-primary">Создать</button>
    </form>
</div>
{% endblock %}
