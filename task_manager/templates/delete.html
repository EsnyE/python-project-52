{% extends 'layout.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Удаление пользователя</h1>
    <p>Вы уверены, что хотите удалить {{ user.first_name }} {{ user.last_name }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'users' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
