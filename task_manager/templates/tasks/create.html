{% extends 'layout.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Создать задачу</h1>
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="id_name" class="form-label">Имя</label>
            <input type="text" name="name" id="id_name" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label for="id_description" class="form-label">Описание</label>
            <textarea name="description" id="id_description" class="form-control" rows="3"></textarea>
        </div>
        
        <div class="mb-3">
            <label for="id_status" class="form-label">Статус</label>
            <select name="status" id="id_status" class="form-select" required>
                <option value="">---------</option>
                {% for status in form.fields.status.queryset %}
                    <option value="{{ status.pk }}">{{ status.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label for="id_executor" class="form-label">Исполнитель</label>
            <select name="executor" id="id_executor" class="form-select">
                <option value="">---------</option>
                {% for user in form.fields.executor.queryset %}
                    <option value="{{ user.pk }}">{{ user.get_full_name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label for="id_labels" class="form-label">Метки</label>
            <select name="labels" id="id_labels" class="form-select" multiple>
                {% for label in form.fields.labels.queryset %}
                    <option value="{{ label.pk }}">{{ label.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
        {% endif %}
        
        <button type="submit" class="btn btn-primary">Создать</button>
    </form>
</div>
{% endblock %}
